services:
  # The Laravel Web Service
  - type: web
    name: autoparts-hub
    env: php
    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_KEY
        generateValue: true
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: autoparts-db
          property: connectionString

# The Managed PostgreSQL Database
databases:
  - name: autoparts-db
    plan: free
    region: oregon # or your preferred region
